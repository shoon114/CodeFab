<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Singleton Pattern Class Diagram</title>
  <desc id="desc">AssemblerUnit and ParserRegistrar access a single StatementParserRegistry instance.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e8c"/>
    </marker>
    <style>
      text { font-family: Segoe UI, Arial, sans-serif; fill: #1c2430; }
      .title { font-size: 18px; font-weight: 700; fill: #173f73; }
      .box { fill: #f8fbff; stroke: #1f4e8c; stroke-width: 2; rx: 10; }
      .head { fill: #dcecff; stroke: #1f4e8c; stroke-width: 2; }
      .singleton { fill: #fffaf0; stroke: #b56b00; stroke-width: 2; rx: 10; }
      .shead { fill: #ffe7bf; stroke: #b56b00; stroke-width: 2; }
      .name { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .arrow { stroke: #1f4e8c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .label { font-size: 12px; fill: #4b5b70; }
    </style>
  </defs>
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="32" y="36" class="title">Singleton Pattern</text>

  <g transform="translate(334 76)">
    <rect class="singleton" width="252" height="162"/>
    <rect class="shead" width="252" height="48" rx="10"/>
    <text x="126" y="19" text-anchor="middle" class="label">&lt;&lt;singleton&gt;&gt;</text>
    <text x="126" y="38" text-anchor="middle" class="name">StatementParserRegistry</text>
    <line x1="0" y1="48" x2="252" y2="48" stroke="#b56b00" stroke-width="2"/>
    <text x="16" y="78" class="body">-factories</text>
    <text x="16" y="102" class="body">+Instance()</text>
    <text x="16" y="126" class="body">+Register(TokenType, Factory)</text>
    <text x="16" y="150" class="body">+Resolve(TokenType)</text>
  </g>
  <g transform="translate(64 118)">
    <rect class="box" width="188" height="78"/>
    <rect class="head" width="188" height="38" rx="10"/>
    <text x="94" y="25" text-anchor="middle" class="name">AssemblerUnit</text>
    <line x1="0" y1="38" x2="188" y2="38" stroke="#1f4e8c" stroke-width="2"/>
    <text x="16" y="62" class="body">+Parse()</text>
  </g>
  <g transform="translate(668 118)">
    <rect class="box" width="188" height="78"/>
    <rect class="head" width="188" height="38" rx="10"/>
    <text x="94" y="25" text-anchor="middle" class="name">ParserRegistrar</text>
    <line x1="0" y1="38" x2="188" y2="38" stroke="#1f4e8c" stroke-width="2"/>
    <text x="16" y="62" class="body">+static registration</text>
  </g>

  <path class="arrow" d="M 252 157 L 334 157"/>
  <path class="arrow" d="M 668 157 L 586 157"/>
  <text x="292" y="140" text-anchor="middle" class="label">Instance().Resolve()</text>
  <text x="626" y="140" text-anchor="middle" class="label">Instance().Register()</text>
</svg>
