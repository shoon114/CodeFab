<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" role="img" aria-labelledby="title desc">
  <title id="title">Strategy Pattern Class Diagram</title>
  <desc id="desc">AssemblerUnit uses the IStatementParser strategy interface. Concrete parser classes implement different parse algorithms.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e8c"/>
    </marker>
    <marker id="triangle" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#ffffff" stroke="#1f4e8c" stroke-width="1.5"/>
    </marker>
    <style>
      text { font-family: Segoe UI, Arial, sans-serif; fill: #1c2430; }
      .title { font-size: 18px; font-weight: 700; fill: #173f73; }
      .box { fill: #f8fbff; stroke: #1f4e8c; stroke-width: 2; rx: 10; }
      .interface { fill: #f3fff8; stroke: #2c7a4b; stroke-width: 2; rx: 10; }
      .head { fill: #dcecff; stroke: #1f4e8c; stroke-width: 2; }
      .ihead { fill: #dcf7e7; stroke: #2c7a4b; stroke-width: 2; }
      .name { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .arrow { stroke: #1f4e8c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .inherit { stroke: #1f4e8c; stroke-width: 2.2; fill: none; marker-end: url(#triangle); }
      .label { font-size: 12px; fill: #4b5b70; }
    </style>
  </defs>
  <rect width="920" height="400" fill="#ffffff"/>
  <text x="32" y="36" class="title">Strategy Pattern</text>

  <g transform="translate(60 126)">
    <rect class="box" width="210" height="112"/>
    <rect class="head" width="210" height="42" rx="10"/>
    <text x="105" y="27" text-anchor="middle" class="name">AssemblerUnit</text>
    <line x1="0" y1="42" x2="210" y2="42" stroke="#1f4e8c" stroke-width="2"/>
    <text x="16" y="72" class="body">+Parse(TokenList)</text>
    <text x="16" y="96" class="body">+select parser</text>
  </g>
  <g transform="translate(370 110)">
    <rect class="interface" width="220" height="132"/>
    <rect class="ihead" width="220" height="48" rx="10"/>
    <text x="110" y="19" text-anchor="middle" class="label">&lt;&lt;strategy&gt;&gt;</text>
    <text x="110" y="38" text-anchor="middle" class="name">IStatementParser</text>
    <line x1="0" y1="48" x2="220" y2="48" stroke="#2c7a4b" stroke-width="2"/>
    <text x="16" y="78" class="body">+Parse(TokenList, pos)</text>
    <text x="16" y="102" class="body">+SyntaxNode</text>
  </g>
  <g transform="translate(668 62)">
    <rect class="box" width="196" height="54"/>
    <text x="98" y="33" text-anchor="middle" class="name">PrintStatementParser</text>
  </g>
  <g transform="translate(668 154)">
    <rect class="box" width="196" height="54"/>
    <text x="98" y="33" text-anchor="middle" class="name">FunctionStatementParser</text>
  </g>
  <g transform="translate(668 246)">
    <rect class="box" width="196" height="54"/>
    <text x="98" y="33" text-anchor="middle" class="name">ReturnStatementParser</text>
  </g>

  <path class="arrow" d="M 270 182 L 370 182"/>
  <path class="inherit" d="M 668 89 C 628 96 610 112 590 136"/>
  <path class="inherit" d="M 668 181 L 590 176"/>
  <path class="inherit" d="M 668 273 C 628 256 610 230 590 206"/>
  <text x="320" y="168" text-anchor="middle" class="label">uses selected strategy</text>
</svg>
